<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact bensoncharly for design and development inquiries.">
    <title>Contact | bensoncharly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-layout {
            display: flex;
            flex-direction: column;
            gap: 4rem;
            max-width: 600px;
        }

        .contact-h1 {
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .contact-info a {
            display: inline-block;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #000;
            padding-bottom: 0.2rem;
            transition: opacity 0.3s;
        }

        .contact-info a:hover {
            opacity: 0.5;
        }

        .social-links {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
        }

        .social-links a {
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
        body { background-color: #06b6d4; }
        .main-header { mix-blend-mode: normal; color: #164e63; }
        .header-glass { background: rgba(6, 182, 212, 0.2); border-bottom: 1px solid rgba(22, 78, 99, 0.2); }
    </style>
</head>

<body>

    <div class="header-glass"></div>
    <header class="main-header">
        <a href="index.html" class="logo-text">bensoncharly</a>

        <button class="menu-toggle" aria-label="Toggle Navigation" aria-expanded="false">
            <span class="line"></span>
            <span class="line"></span>
        </button>

        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-item">Showroom</a></li>
                <li><a href="blog.html" class="nav-item">Blog</a></li>

                <li><a href="contact.html" class="nav-item">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-container main-content">
        <div class="contact-layout">
            <div>
                <h1 class="contact-h1">Let's talk about<br>your next project.</h1>
            </div>

            <div class="contact-info">
                <p>Feel free to reach out for collaborations or just a friendly hello.</p><br>
                <a href="mailto:hello@bensoncharly.com">hello@bensoncharly.com</a>
            </div>

            <div class="social-links">
                <a href="#">Twitter</a>
                <a href="#">LinkedIn</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-left">&copy; 2026 bensoncharly</div>
        <div class="footer-links">
            <a href="#">Impressum</a>
            <a href="#">Datenschutz</a>
            <a href="contact.html">Kontakt</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
